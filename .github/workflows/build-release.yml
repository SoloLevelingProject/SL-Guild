name: Build & Discord Notify

on:
  push:
    branches: [ main ]

jobs:
  build-and-notify:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean package --no-transfer-progress

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"• %s" -10)
          else
            CHANGES=$(git log ${PREV_TAG}..HEAD --pretty=format:"• %s")
          fi
          if [ -z "$CHANGES" ]; then
            CHANGES="• Không có thay đổi đáng chú ý"
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "changes<<$EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "$EOF" >> $GITHUB_OUTPUT

      - name: Get short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ steps.vars.outputs.short_sha }}
          name: "SL-Guild Build #${{ github.run_number }}"
          body: |
            ## Thay đổi
            ${{ steps.changelog.outputs.changes }}
          files: banghoi-plugin/target/SL-Guild.jar
          draft: false
          prerelease: false

      - name: Notify Discord
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          AUTHOR="${{ github.event.head_commit.author.name }}"
          SHORT_SHA="${{ steps.vars.outputs.short_sha }}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/build-${SHORT_SHA}/SL-Guild.jar"

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL secret not set; skipping Discord notification."
            exit 0
          fi

          CHANGES=$(cat <<'CHANGES_EOF'
          ${{ steps.changelog.outputs.changes }}
          CHANGES_EOF
          )

          if [ ${#CHANGES} -gt 800 ]; then
            CHANGES="${CHANGES:0:800}..."
          fi

          CHANGES_ESCAPED=$(echo "$CHANGES" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read())[1:-1])')

          curl -s -H "Content-Type: application/json" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -d "{
              \"embeds\": [{
                \"title\": \"⚒️ SL-Guild — Bản Build Mới #${{ github.run_number }}\",
                \"description\": \"Một bản build mới đã được tạo thành công!\",
                \"color\": 5025616,
                \"fields\": [
                  {
                    \"name\": \"📝 Thay đổi\",
                    \"value\": \"${CHANGES_ESCAPED}\",
                    \"inline\": false
                  },
                  {
                    \"name\": \"📦 Tải về\",
                    \"value\": \"[Nhấn vào đây để tải](${DOWNLOAD_URL})\",
                    \"inline\": true
                  },
                  {
                    \"name\": \"🔖 Commit\",
                    \"value\": \"\`${SHORT_SHA}\`\",
                    \"inline\": true
                  }
                ],
                \"footer\": {
                  \"text\": \"Update bởi ${AUTHOR} • SL-Guild\"
                },
                \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
              }]
            }"

          curl -s -X POST "$DISCORD_WEBHOOK_URL" \
            -F "file=@banghoi-plugin/target/SL-Guild.jar"
