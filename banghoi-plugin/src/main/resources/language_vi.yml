status:
  ENABLE: '&aĐang hoạt động'
  DISABLE: '&cĐã bị ngừng hoạt động'

subject:
  name:
    INVITE: Mời thành viên
    KICK: Đuổi thành viên
    SETCUSTOMNAME: Đổi tên hiển thị
    SETICON: Đổi biểu tượng
    SPAWN: Dịch chuyển về căn cứ
    SETSPAWN: Thiết lập căn cứ
    SETMESSAGE: Thiết lập lời nhắn
    SETMANAGER: Thêm quản lý
    REMOVEMANAGER: Bãi nhiệm quản lý
    CHAT: Kênh chat bang hội
    UPGRADE: Nâng cấp bang hội
    MANAGEALLY: Thiết lập đồng minh
  description:
    INVITE: Gửi lời mời người chơi khác gia nhập bang
    KICK: Trục xuất một thành viên ra khỏi bang
    SETCUSTOMNAME: Thay đổi tên hiển thị của bang (hỗ trợ mã màu)
    SETICON: Thay đổi biểu tượng đại diện của bang
    SPAWN: Dịch chuyển về điểm căn cứ của bang
    SETSPAWN: Thiết lập vị trí hiện tại làm căn cứ
    SETMESSAGE: Thay đổi lời nhắn/thông báo chung của bang
    SETMANAGER: Thăng chức một thành viên lên làm quản lý
    REMOVEMANAGER: Tước quyền quản lý của một thành viên
    CHAT: Bật hoặc tắt kênh trò chuyện nội bộ bang
    UPGRADE: Mở giao diện nâng cấp bang hội
    MANAGEALLY: Gửi yêu cầu và quản lý danh sách bang đồng minh

